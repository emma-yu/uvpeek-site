Xipw1IzDl+adIRFhQT+OPQ9+0Lkzlo05e+fp6s7Q";
  const SALT_LEN = 16;
  const IV_LEN = 12;
  const ITERATIONS = 150000;
  const decoy = document.getElementById('decoy');
  const decoyMsg = document.getElementById('decoy-msg');
  const content = document.getElementById('content');

  function b64ToBytes(s) {
    const bin = atob(s);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  async function decryptBlob(password) {
    const data = b64ToBytes(BLOB);
    const salt = data.slice(0, SALT_LEN);
    const iv = data.slice(SALT_LEN, SALT_LEN + IV_LEN);
    const ct = data.slice(SALT_LEN + IV_LEN);
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(password), {name: 'PBKDF2'}, false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name: 'PBKDF2', salt: salt, iterations: ITERATIONS, hash: 'SHA-256'},
      km, {name: 'AES-GCM', length: 256}, false, ['decrypt']
    );
    const plaintext = await crypto.subtle.decrypt({name: 'AES-GCM', iv: iv}, key, ct);
    return new TextDecoder().decode(plaintext);
  }

  function relocateStyles(container) {
    container.querySelectorAll('style[data-payload]').forEach(s => {
      const newStyle = document.createElement('style');
      newStyle.textContent = s.textContent;
      document.head.appendChild(newStyle);
      s.remove();
    });
  }

  function executeScripts(container) {
    container.querySelectorAll('script').forEach(oldScript => {
      const newScript = document.createElement('script');
      for (const a of oldScript.attributes) newScript.setAttribute(a.name, a.value);
      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  async function attempt() {
    const hash = window.location.hash;
    const m = hash.match(/k=([^&]+)/);
    if (!m) {
      decoyMsg.textContent = 'Not Found';
      return;
    }
    let token;
    try { token = decodeURIComponent(m[1]); } catch (e) { token = m[1]; }
    try {
      const html = await decryptBlob(token);
      // Pre-apply lang class so initial render has correct visibility
      const stored = localStorage.getItem('xxmd-lang') || 'zh';
      document.body.classList.add('lang-' + stored);
      content.innerHTML = html;
      relocateStyles(content);
      executeScripts(content);
      document.body.classList.add('unlocked');
    } catch (err) {
      console.error('Decryption failed');
      decoyMsg.textContent = 'Invalid access key';
    }
  }

  if (!window.crypto || !window.crypto.subtle) {
    decoyMsg.textContent = 'Browser unsupported';
    return;
  }

  attempt();
  window.addEventListener('hashchange', attempt);
})();
